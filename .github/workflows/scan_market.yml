name: Monthly Market Scan

on:
  schedule:
    # 毎月1日 JST 01:00 (UTC 16:00)
    - cron: "0 16 1 * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scan
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python -m swing_trading.scan_market

      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MONTH=$(date -d "$(date +%Y-%m-01)" "+%Y年%-m月" 2>/dev/null || date -v1d "+%Y年%-m月")
          gh issue create \
            --title "${MONTH} トレンドスキャン結果" \
            --body-file scan_result.md
